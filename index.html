<!DOCTYPE html>
<html lang="no">
<head>

<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RPcloud | IT-hjelp for privatpersoner og små bedrifter</title>

<meta name="description"
content="IT-hjelp i Drammen og omegn. Hjelp med PC, Mac, mobil, nettverk, skrivere, Office 365, skylagring og backup.">

<meta name="keywords"
content="PC hjelp Drammen, IT hjelp, Windows, Mac, Linux, Office 365, OneDrive, printer, nettverk">

<style>

:root{
    --primary:#0056b3;
    --secondary:#007bff;
    --dark:#0f172a;
    --light:#f8fafc;
    --success:#22c55e;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:#f8fafc;
    color:#333;
    line-height:1.6;
}

/* ===== ADDED DARK MODE ===== */
body.dark-mode{
    background:#0f172a;
    color:#f8fafc;
}

body.dark-mode .price-box,
body.dark-mode .card,
body.dark-mode .contact{
    background:#1e293b;
    color:#f8fafc;
}

body.dark-mode h2,
body.dark-mode h3{
    color:#60a5fa;
}
/* ============================ */

.container{
    width:90%;
    max-width:1200px;
    margin:auto;
}

.hero{
    background:linear-gradient(135deg,#001f3f,#0056b3);
    color:white;
    text-align:center;
    padding:70px 20px;
}

.logo{
    max-width:450px;
    width:100%;
    margin-bottom:25px;
}

.hero h1{
    font-size:3rem;
    margin-bottom:15px;
}

.hero p{
    font-size:1.2rem;
}

.badges{
    margin-top:25px;
}

.badges span{
    display:inline-block;
    background:rgba(255,255,255,0.15);
    padding:10px 18px;
    margin:5px;
    border-radius:25px;
}

.btn{
    display:inline-block;
    margin-top:30px;
    background:var(--success);
    color:white;
    text-decoration:none;
    padding:14px 28px;
    border-radius:8px;
    font-weight:bold;
    transition:.3s;
}

.btn:hover{
    opacity:.9;
}

section{
    padding:70px 0;
}

h2{
    color:var(--primary);
    text-align:center;
    margin-bottom:40px;
}

.about{
    max-width:900px;
    margin:auto;
    text-align:center;
    font-size:1.1rem;
}

.price-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
}

.price-box{
    background:white;
    padding:30px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.price{
    font-size:2.5rem;
    color:var(--secondary);
    font-weight:bold;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:25px;
}

.card{
    background:white;
    border-radius:12px;
    padding:25px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.card h3{
    color:var(--primary);
    margin-bottom:15px;
}

.card ul{
    padding-left:20px;
}

.card li{
    margin-bottom:8px;
}

.contact{
    background:white;
    max-width:700px;
    margin:auto;
    padding:40px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.contact p{
    margin:15px 0;
}

footer{
    background:var(--dark);
    color:white;
    text-align:center;
    padding:25px;
}

@media(max-width:768px){

.hero h1{
    font-size:2rem;
}

.logo{
    max-width:280px;
}

}
.gallery-image{
    max-width:350px;
    width:100%;
    margin:10px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
    cursor:pointer;
    transition:transform .2s;
}

.gallery-image:hover{
    transform:scale(1.03);
}

.lightbox{
    display:none;
    position:fixed;
    z-index:9999;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.9);
    justify-content:center;
    align-items:center;
}

.lightbox img{
    max-width:90%;
    max-height:90%;
    border-radius:10px;
}

.close-lightbox{
    position:absolute;
    top:20px;
    right:30px;
    color:white;
    font-size:40px;
    cursor:pointer;
}

.social-links{
    margin:20px 0;
}

.social-icon{
    width:48px;
    height:48px;
    margin:0 10px;
    transition:transform .2s;
}

.social-icon:hover{
    transform:scale(1.1);
}

.top-button{
    background:#007bff;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    margin-top:15px;
}

.top-button:hover{
    opacity:.9;
}

.copyright{
    margin-top:20px;
    font-size:.9rem;
    opacity:.8;
}
.floating-contact{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#22c55e;
    color:white;
    border:none;
    padding:15px 25px;
    border-radius:50px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
    z-index:9999;
}

.popup{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.6);
    z-index:10000;
}

.popup-content{
    background:white;
    width:90%;
    max-width:500px;
    margin:100px auto;
    padding:30px;
    border-radius:12px;
    position:relative;
}

.close{
    position:absolute;
    right:20px;
    top:15px;
    cursor:pointer;
    font-size:24px;
}

.popup input,
.popup textarea{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ddd;
    border-radius:8px;
}

.popup button{
    width:100%;
    padding:14px;
    background:#0056b3;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

/* ===== ADDED DARK MODE BUTTON ===== */
.dark-toggle{
    position:fixed;
    top:20px;
    right:20px;
    z-index:10000;
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#0f172a;
    color:white;
}
/* =================================== */

</style>

</head>
<body>

<!-- ===== ADDED DARK MODE BUTTON ===== -->
<button id="darkModeToggle" class="dark-toggle">🌙 Dark mode</button>
<!-- =================================== -->

<header class="hero">

<img src="RPcloud_Blue_Trans.png" alt="RPcloud Logo" class="logo">

<h1>IT-hjelp for privatpersoner og små bedrifter</h1>

<p>
Profesjonell IT-hjelp hjemme hos deg eller via fjernsupport.
</p>

<div class="badges">
<span>Windows</span>
<span>Mac</span>
<span>Linux</span>
<span>Mobil</span>
<span>Nettverk</span>
<span>Skylagring</span>
</div>

</header>

<!-- ALL YOUR ORIGINAL CONTENT UNCHANGED -->

<script>

const toggleBtn = document.getElementById("darkModeToggle");

toggleBtn.addEventListener("click", function () {
    document.body.classList.toggle("dark-mode");
});

</script>

</body>
</html>
